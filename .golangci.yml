version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - copyloopvar
    - dogsled
    - durationcheck
    - errorlint
    - gocritic
    - gocyclo
    - goprintffuncname
    - misspell
    - nakedret
    - nilerr
    - rowserrcheck
    - unconvert
    - whitespace
  disable:
    - staticcheck
    - unused
  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
      - common-false-positives
      - legacy
    rules:
      - linters:
          - gosec
        path: _test\.go
        text: "G703"
    paths:
      - third_party$
      - builtin$
      - examples$
      - node_modules
formatters:
  enable:
    - gofmt
    - golines
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
      - node_modules
severity:
  default: warning
